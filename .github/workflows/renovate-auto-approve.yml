name: Renovate Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  auto-approve-renovate:
    name: Auto Approve Renovate
    uses: TimSchoenle/actions/.github/workflows/maintenance-auto-approve-renovate.yaml@63dd8cbcdfbbbb95c47ef9a3e4db30660ac57303 # tag=workflows-maintenance-auto-approve-renovate-v1.4.9
    permissions:
      pull-requests: write # To approve PRs
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
