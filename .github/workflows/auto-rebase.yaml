name: Auto-Rebase PRs on Push to Main

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  auto-rebase:
    name: Auto-Rebase
    uses: TimSchoenle/actions/.github/workflows/maintenance-auto-rebase.yaml@f6d28635c2ce9ea0854414d2086482ad3b6d082b # workflows-maintenance-auto-rebase-v1.1.3
    secrets:
      app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
      private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
    with:
      label: 'auto-rebase'