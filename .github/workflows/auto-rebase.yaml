name: Auto-Rebase PRs on Push to Main

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  auto-rebase:
    name: Auto-Rebase
    uses: TimSchoenle/actions/.github/workflows/maintenance-auto-rebase.yaml@634ae2d73de248f325149c33d40af6da3fe66ec9 # workflows-maintenance-auto-rebase-v1.1.4
    secrets:
      app_id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
      private_key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
    with:
      label: 'auto-rebase'